# WebXR Server Project — Docker Compose
#
# Usage (all env vars are optional — sensible defaults apply):
#   sudo docker compose up --build
#
# Optional overrides:
#   SERVER_HOST        Host IP visible to the Quest (default: auto-detected LAN IP)
#   IMAGE_SERVER_PORT  Renderer + signaling server port (default: 3001)
#   VR_CLIENT_PORT     VR client static server port     (default: 3000)
#   NRRD_FILE          Full host path to the .nrrd file (default: ./image_server/public/static/volume.nrrd)
#
# Example:
#   sudo NRRD_FILE=/home/abishekj/Desktop/3_RatC_greyscale.nrrd docker compose up

services:

  # ---------------------------------------------------------------------------
  # image_server — Puppeteer headless renderer + WebSocket signaling broker
  # ---------------------------------------------------------------------------
  image_server:
    build:
      context: ./image_server
      dockerfile: Dockerfile
    network_mode: host
    environment:
      NRRD_FILE: ${NRRD_FILE:?Please provide NRRD_FILE, e.g. sudo NRRD_FILE=/path/to/file.nrrd docker compose up}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      IMAGE_SERVER_PORT: ${IMAGE_SERVER_PORT:-3001}
      RAYMARCH_STEPS: ${RAYMARCH_STEPS:-256}
      RAYMARCH_THRESHOLD: ${RAYMARCH_THRESHOLD:-0.25}
      RAYMARCH_DENSITY: ${RAYMARCH_DENSITY:-150.0}
      RAYMARCH_GAMMA: ${RAYMARCH_GAMMA:-0.6}
      WORLD_MAX: ${WORLD_MAX:-3}
      INITIAL_IPD: ${INITIAL_IPD:-0.064}
      MAX_BITRATE: ${MAX_BITRATE:-100000000}
      MAX_FRAMERATE: ${MAX_FRAMERATE:-90}
      RENDER_WIDTH: ${RENDER_WIDTH:-1920}
      RENDER_HEIGHT: ${RENDER_HEIGHT:-1080}
      USE_LARGE_FILE_LOADER: ${USE_LARGE_FILE_LOADER:-false}
      MAX_SLABS: ${MAX_SLABS:-1}
      DOCKER: "1"
      CERT_DIR: /certs
    volumes:
      - ${NRRD_FILE}:/app/image_server/public/static/volume.nrrd:ro
      - ./logs:/app/logs
      - ./certs:/certs:ro
    shm_size: "256mb"
    runtime: nvidia
    # ---------------------------------------------------------------------------
    # GPU support (NVIDIA) — requires NVIDIA Container Toolkit installed.
    # ---------------------------------------------------------------------------
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, display]

  # ---------------------------------------------------------------------------
  # vr_client — HTTPS static server that the Quest headset browser loads
  # ---------------------------------------------------------------------------
  vr_client:
    build:
      context: .
      dockerfile: vr_client/Dockerfile
    network_mode: host
    environment:
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      IMAGE_SERVER_PORT: ${IMAGE_SERVER_PORT:-3001}
      VR_CLIENT_PORT: ${VR_CLIENT_PORT:-3000}
      CERT_DIR: /certs
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - image_server
